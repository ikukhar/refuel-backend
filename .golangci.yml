version: "2"
run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - sqlclosecheck
  exclusions:
    paths:
      - migrations

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - migrations
