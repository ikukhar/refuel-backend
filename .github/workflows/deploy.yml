name: Deploy to Production

on:
  push:
    branches: [master]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/refuel-backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          args: --timeout=5m
          install-mode: goinstall

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - name: Run tests
        run: go test ./... -v -race

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Copy migrations to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "migrations/*"
          target: "/opt/refuel/migrations"
          strip_components: 1

      - name: Update image tag, run migrations, restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/refuel
            grep '^IMAGE_TAG=' .env > .last_good_tag
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ github.sha }}/" .env

            docker compose -f docker-compose.prod.yml pull

            echo "Running migrations..."
            docker compose -f docker-compose.prod.yml run --rm migrate

            echo "Restarting services..."
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

      - name: Wait for containers to settle
        run: sleep 15

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            if curl -sfk --max-time 5 http://${{ secrets.SSH_HOST }}/health; then
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 5
          done
          exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/refuel
            PREV_TAG=$(cat .last_good_tag | cut -d '=' -f2)
            echo "Rolling back to $PREV_TAG"
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$PREV_TAG/" .env
            docker compose -f docker-compose.prod.yml up -d

      # - name: Notify Telegram
